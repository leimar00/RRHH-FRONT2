<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH CESDE - Aspirantes</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>&#127970; SELECCIÓN RRHH CESDE</h1>
        <span>Sistema de Gestión de Talento Humano</span>
    </header>

    <!-- NAVEGACIÓN -->
    <nav>
        <a href="index.html">Inicio</a>
        <a href="vacantes.html">Vacantes</a>
        <a href="aspirantes.html" class="activo">Aspirantes</a>
        <a href="procesos.html">Procesos</a>
    </nav>

    <main>

        <!-- =====================================================
             FORMULARIO DE REGISTRO DE ASPIRANTE
             ===================================================== -->
        <div class="seccion">
            <h2>Registrar Nuevo Aspirante</h2>

            <div id="mensaje" class="mensaje"></div>

            <div class="formulario">

                <!-- Campo 1: Nombre -->
                <div class="campo">
                    <label for="nombre">Nombre *</label>
                    <input
                        type="text"
                        id="nombre"
                        placeholder="Ej: Juan"
                        maxlength="60">
                </div>

                <!-- Campo 2: Apellido -->
                <div class="campo">
                    <label for="apellido">Apellido *</label>
                    <input
                        type="text"
                        id="apellido"
                        placeholder="Ej: Pérez García"
                        maxlength="60">
                </div>

                <!-- Campo 3: Email (tipo="email" ayuda con la validación básica del navegador) -->
                <div class="campo">
                    <label for="email">Correo Electrónico *</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Ej: juan.perez@correo.com"
                        maxlength="100">
                </div>

                <!-- Campo 4: Teléfono (opcional) -->
                <div class="campo">
                    <label for="telefono">Teléfono / Celular</label>
                    <input
                        type="tel"
                        id="telefono"
                        placeholder="Ej: 300 123 4567"
                        maxlength="20">
                </div>

                <!-- Campo 5: Perfil (opcional, ocupa las 2 columnas) -->
                <div class="campo completo">
                    <label for="perfil">Perfil / Resumen Hoja de Vida</label>
                    <textarea
                        id="perfil"
                        placeholder="Describe brevemente la formación, experiencia y habilidades del aspirante..."></textarea>
                </div>

                <!-- Botones -->
                <div class="acciones-formulario">
                    <button class="btn btn-primario" onclick="registrarAspirante()">
                        &#128190; Guardar Aspirante
                    </button>
                    <button class="btn" style="background-color: #95a5a6; color: white;"
                            onclick="limpiarFormulario()">
                        Limpiar
                    </button>
                </div>

            </div>
        </div>


        <!-- =====================================================
             TABLA DE ASPIRANTES
             ===================================================== -->
        <div class="seccion">
            <h2>Aspirantes Registrados</h2>

            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre Completo</th>
                            <th>Correo Electrónico</th>
                            <th>Teléfono</th>
                            <th>Perfil</th>
                            <th>Fecha Registro</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-aspirantes">
                        <!-- aspirantes.js llena este <tbody> automáticamente -->
                    </tbody>
                </table>
            </div>

        </div>

    </main>

    <footer>
        <p>CESDE &copy; 2024 &mdash; Sistema de Selección RRHH</p>
    </footer>

    <script src="js/almacenamiento.js"></script>
    <script src="js/aspirantes.js"></script>

</body>
</html>
